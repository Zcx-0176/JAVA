spring:
  datasource:
    url: jdbc:mysql://localhost:3306/employee_db?useUnicode=true&characterEncoding=utf8&serverTimezone=GMT%2B8
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true


# datasource：配置 MySQL 数据库连接信息（URL、用户名、密码、驱动类）。
# jpa.hibernate.ddl-auto: update：Hibernate 会自动根据实体类更新数据库表结构。
# show-sql: true：控制台打印执行的 SQL 语句，方便调试。