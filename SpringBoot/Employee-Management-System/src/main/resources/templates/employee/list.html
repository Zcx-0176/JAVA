<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>员工列表</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<!-- 只保留这一个导航栏 -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
    <div class="container">
        <a class="navbar-brand" href="/">员工管理系统</a>
        <ul class="navbar-nav">
            <li class="nav-item">
                <a class="nav-link" href="/">首页</a>
            </li>
            <li class="nav-item">
                <a class="nav-link active" href="/employees">员工列表</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="/employees/add">添加员工</a>
            </li>
        </ul>
    </div>
</nav>

<div class="container">
    <h2>员工列表</h2>
    <a class="btn btn-primary mb-3" href="/employees/add">添加新员工</a>
    <table class="table table-bordered">
        <thead class="table-light">
        <tr>
            <th>ID</th>
            <th>姓名</th>
            <th>邮箱</th>
            <th>年龄</th>
            <th>操作</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="emp : ${employees}">
            <td th:text="${emp.id}"></td>
            <td th:text="${emp.name}"></td>
            <td th:text="${emp.email}"></td>
            <td th:text="${emp.age}"></td>
            <td>
                <a class="btn btn-sm btn-warning me-2" th:href="@{/employees/edit/{id}(id=${emp.id})}">编辑</a>
                <a class="btn btn-sm btn-danger" th:href="@{/employees/delete/{id}(id=${emp.id})}"
                   onclick="return confirm('确定要删除该员工吗？')">删除</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>

</body>
</html>
