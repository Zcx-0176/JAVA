<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>添加员工</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
    <div class="container">
        <a class="navbar-brand" href="/">员工管理系统</a>
        <ul class="navbar-nav">
            <li class="nav-item"><a class="nav-link" href="/">首页</a></li>
            <li class="nav-item"><a class="nav-link" href="/employees">员工列表</a></li>
            <li class="nav-item"><a class="nav-link active" href="/employees/add">添加员工</a></li>
        </ul>
    </div>
</nav>

<div class="container">
    <h2>添加新员工</h2>
    <form th:action="@{/employees}" th:object="${employee}" method="post" class="mt-3">
        <div class="mb-3">
            <label class="form-label">姓名</label>
            <input type="text" class="form-control" name="name" th:value="${employee.name}" required>
        </div>
        <div class="mb-3">
            <label class="form-label">邮箱</label>
            <input type="email" class="form-control" name="email" th:value="${employee.email}" required>
        </div>
        <div class="mb-3">
            <label class="form-label">年龄</label>
            <input type="number" class="form-control" name="age" th:value="${employee.age}" min="1" max="120" required>
        </div>
        <button type="submit" class="btn btn-primary">保存</button>
        <a class="btn btn-secondary ms-2" href="/employees">取消</a>
    </form>
</div>

</body>
</html>
