<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>投递记录</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* 跟你管理员页面保持一样的返回按钮样式 */
        .back {
            display: inline-block;
            margin-bottom: 20px;
            padding: 8px 16px;
            background: #1677ff;
            color: white !important;
            border-radius: 4px;
            text-decoration: none !important;
            transition: background 0.3s;
        }
        .back:hover {
            background: #4096ff;
        }
    </style>
</head>
<body class="bg-light">
<div class="container mt-4">

    <!-- 跟管理员页面一样 ↓ 直接写返回链接，不用JS -->
    <a href="/enterprise/page/index" class="back">← 返回企业首页</a>

    <h3 class="mb-3">收到的投递</h3>
    <table class="table table-striped table-bordered shadow">
        <thead class="table-dark">
        <tr>
            <th>用户ID</th>
            <th>岗位名称</th>
            <th>投递时间</th>
            <th>状态</th>
            <th>操作</th>
        </tr>
        </thead>
        <tbody id="deliveryList"></tbody>
    </table>
</div>

<script>
    const enterpriseId = 1;
    fetch(`/delivery/getByEnterpriseId?enterpriseId=${enterpriseId}`).then(res => res.json()).then(r => {
        if (r.code === 200) {
            const list = r.data;
            const tbody = document.getElementById("deliveryList");
            const statusMap = ["待查看", "已查看", "已录用", "已拒绝"];
            list.forEach(d => {
                tbody.innerHTML += `
                <tr>
                    <td>${d.userId}</td>
                    <td>${d.jobName}</td>
                    <td>${d.deliveryTime}</td>
                    <td>${statusMap[d.status]}</td>
                    <td>
                        <select class="form-select form-select-sm" onchange="audit(${d.id},this.value)">
                            <option value="0" ${d.status===0?"selected":""}>待查看</option>
                            <option value="1" ${d.status===1?"selected":""}>已查看</option>
                            <option value="2" ${d.status===2?"selected":""}>已录用</option>
                            <option value="3" ${d.status===3?"selected":""}>已拒绝</option>
                        </select>
                    </td>
                </tr>`;
            });
        }
    });

    function audit(id, status) {
        fetch(`/delivery/audit?id=${id}&status=${status}&userType=enterprise`, {
            method: "POST"
        }).then(res => res.json()).then(r => {
            alert(r.msg);
            location.reload();
        });
    }
</script>
</body>
</html>
