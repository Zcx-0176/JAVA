<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>企业注册</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .back {
            display: inline-block;
            margin-bottom: 20px;
            padding: 8px 16px;
            background: #1677ff;
            color: white !important;
            border-radius: 4px;
            text-decoration: none !important;
            transition: background 0.3s;
        }
        .back:hover {
            background: #4096ff;
        }
    </style>
</head>
<body class="bg-light">
<div class="container mt-5">
    <a href="/enterprise/page/index" class="back">← 返回企业首页</a>
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-primary text-white text-center">
                    <h3>企业注册</h3>
                </div>
                <div class="card-body">
                    <form id="registerForm">
                        <div class="mb-3">
                            <label class="form-label">企业账号</label>
                            <input type="text" class="form-control" name="account" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">企业名称</label>
                            <input type="text" class="form-control" name="enterpriseName" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">密码</label>
                            <input type="password" class="form-control" name="password" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">企业地址</label>
                            <input type="text" class="form-control" name="address">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">企业介绍</label>
                            <textarea class="form-control" name="introduction"></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">主营业务</label>
                            <input type="text" class="form-control" name="mainBusiness">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">工作时间</label>
                            <input type="text" class="form-control" name="workTime">
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary">注册</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<script>
    document.getElementById("registerForm").addEventListener("submit", e => {
        e.preventDefault();
        const data = Object.fromEntries(new FormData(e.target));
        fetch("/enterprise/add", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(data)
        }).then(res => res.json()).then(r => {
            alert(r.msg);
            if (r.code === 200) location.href = "/enterprise/page/index";
        });
    });
</script>
</body>
</html>
