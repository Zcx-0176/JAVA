<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>留言中心</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .back {
            display: inline-block;
            margin-bottom: 20px;
            padding: 8px 16px;
            background: #1677ff;
            color: white !important;
            border-radius: 4px;
            text-decoration: none !important;
            transition: background 0.3s;
        }
        .back:hover {
            background: #4096ff;
        }
    </style>
</head>
<body class="bg-light">
<div class="container mt-4">
    <a href="/enterprise/page/index" class="back">← 返回企业首页</a>
    <h3 class="mb-3">留言中心</h3>
    <div id="msgList" class="mb-4"></div>

    <div class="card shadow">
        <div class="card-header">
            发送留言
        </div>
        <div class="card-body">
            <!-- 这里加了输入框，自己写要发给谁 -->
            <div class="mb-3">
                <label class="form-label">接收人用户名</label>
                <input type="text" id="toUsername" class="form-control" placeholder="请输入接收人账号（如 admin）">
            </div>

            <textarea id="sendContent" class="form-control mb-3" rows="3" placeholder="请输入留言内容"></textarea>
            <button class="btn btn-primary" onclick="sendMsg()">发送留言</button>
        </div>
    </div>
</div>

<script>
    // 固定企业ID
    const enterpriseId = 1;
    // 当前企业账号（用来查发给我的留言）
    let enterpriseUsername = "";

    // 页面加载 → 获取当前企业账号
    window.onload = async function () {
        try {
            let res = await fetch(`/enterprise/getById?id=${enterpriseId}`);
            let data = await res.json();
            if (data.code === 200) {
                enterpriseUsername = data.data.account;
                // 加载：所有发给【当前企业】的留言
                loadMyMessages();
            }
        } catch (e) {
            alert("加载失败");
        }
    };

    // 加载【发给我】的留言（username = 我）
    function loadMyMessages() {
        fetch(`/message/getByUsername?username=${enterpriseUsername}`)
            .then(res => res.json())
            .then(r => {
                let list = r.data || [];
                let div = document.getElementById("msgList");
                div.innerHTML = "";

                if (list.length === 0) {
                    div.innerHTML = "<p class='text-muted'>暂无留言</p>";
                    return;
                }

                list.forEach(m => {
                    div.innerHTML += `
                    <div class="card mb-2 shadow-sm">
                        <div class="card-body p-3">
                            <p class="mb-1">${m.content}</p>
                            <small class="text-muted">发送时间：${m.createTime}</small>
                            ${m.reply ? `<p class="text-primary mt-2">管理员回复：${m.reply}</p>` : ''}
                        </div>
                    </div>`;
                });
            });
    }

    // ✅ 发送留言：接收人自己输入
    function sendMsg() {
        // 拿到你输入的接收人
        let toUsername = document.getElementById("toUsername").value.trim();
        let content = document.getElementById("sendContent").value.trim();

        if (!toUsername) return alert("请输入接收人用户名！");
        if (!content) return alert("请输入留言内容！");

        // 发送：username = 你输入的接收人
        fetch("/message/add", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                username: toUsername,  // 这里是你手写的接收人
                userType: "enterprise",
                content: content
            })
        })
            .then(res => res.json())
            .then(r => {
                alert(r.msg);
                if (r.code === 200) {
                    document.getElementById("sendContent").value = "";
                    loadMyMessages();
                }
            });
    }
</script>
</body>
</html>
