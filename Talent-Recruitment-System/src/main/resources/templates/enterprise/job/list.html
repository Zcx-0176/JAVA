<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>岗位列表</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .back {
            display: inline-block;
            margin-bottom: 20px;
            padding: 8px 16px;
            background: #1677ff;
            color: white !important;
            border-radius: 4px;
            text-decoration: none !important;
            transition: background 0.3s;
        }
        .back:hover {
            background: #4096ff;
        }
    </style>
</head>
<body class="bg-light">
<div class="container mt-4">
    <a href="/enterprise/page/index" class="back">← 返回企业首页</a>
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3>我的岗位</h3>
        <a href="/enterprise/page/job/add" class="btn btn-primary">新增岗位</a>
    </div>
    <table class="table table-striped table-bordered shadow">
        <thead class="table-dark">
        <tr>
            <th>岗位名称</th>
            <th>学历要求</th>
            <th>薪资</th>
            <th>工作地点</th>
            <th>状态</th>
            <th>操作</th>
        </tr>
        </thead>
        <tbody id="jobList"></tbody>
    </table>
</div>
<script>
    const enterpriseId = 1;
    fetch(`/job/getByEnterpriseId?enterpriseId=${enterpriseId}`).then(res => res.json()).then(r => {
        if (r.code === 200) {
            const list = r.data;
            const tbody = document.getElementById("jobList");
            list.forEach(job => {
                const statusText = job.jobStatus === 1 ? "招聘中" : "已关闭";
                tbody.innerHTML += `
                <tr>
                    <td>${job.jobName}</td>
                    <td>${job.targetEducation}</td>
                    <td>${job.salary}</td>
                    <td>${job.workLocation}</td>
                    <td>${statusText}</td>
                    <td>
                        <a href="/enterprise/page/job/update?id=${job.id}" class="btn btn-sm btn-warning">编辑</a>
                        <button class="btn btn-sm btn-danger" onclick="del(${job.id})">删除</button>
                    </td>
                </tr>`;
            });
        }
    });

    function del(id) {
        if (!confirm("确认删除？")) return;
        fetch(`/job/delete?id=${id}`).then(res => res.json()).then(r => {
            alert(r.msg);
            if (r.code === 200) location.reload();
        });
    }
</script>
</body>
</html>
