<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>会员申请</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .back {
            display: inline-block;
            margin-bottom: 20px;
            padding: 8px 16px;
            background: #1677ff;
            color: white !important;
            border-radius: 4px;
            text-decoration: none !important;
            transition: background 0.3s;
        }
        .back:hover {
            background: #4096ff;
        }
    </style>
</head>
<body class="bg-light">
<div class="container mt-5">
    <a href="/enterprise/page/index" class="back">← 返回企业首页</a>
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-dark text-white text-center">
                    <h3>企业会员申请</h3>
                </div>
                <div class="card-body">
                    <form id="applyForm">
                        <div class="mb-3">
                            <label class="form-label">企业账号</label>
                            <input type="text" class="form-control" name="account" id="account" readonly>
                        </div>
                        <input type="hidden" name="identity" value="2">
                        <input type="hidden" name="status" value="0">
                        <div class="d-grid">
                            <button type="submit" class="btn btn-dark">提交会员申请</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<script>
    const enterpriseId = 1;
    window.onload = async function() {
        const res = await fetch(`/enterprise/getById?id=${enterpriseId}`);
        const data = await res.json();
        if (data.code === 200) {
            document.getElementById("account").value = data.data.account;
        }
    };
    document.getElementById("applyForm").addEventListener("submit", e => {
        e.preventDefault();
        const data = Object.fromEntries(new FormData(e.target));
        data.identity = 2;
        data.status = 0;
        fetch("/memberApply/add", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(data)
        }).then(res => res.json()).then(r => {
            alert(r.msg);
            if (r.code === 200) location.href = "/enterprise/page/index";
        });
    });
</script>
</body>
</html>
