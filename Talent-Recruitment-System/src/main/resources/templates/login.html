<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>用户登录 - 人才招聘系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .login-box {
            width: 400px;
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 0 10px #ccc;
        }
        .login-box h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
        }
        .input-item {
            margin-bottom: 20px;
        }
        input {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .role-box {
            display: flex;
            justify-content: space-around;
            margin: 10px 0 20px;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #409eff;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover {
            background: #66b1ff;
        }
        .msg {
            color: red;
            text-align: center;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
<div class="login-box">
    <h2>人才招聘系统登录</h2>

    <!-- 错误提示 -->
    <div th:if="${msg}" class="msg" th:text="${msg}"></div>

    <form action="/login" method="post">
        <div class="input-item">
            <input type="text" name="account" placeholder="请输入账号" required>
        </div>
        <div class="input-item">
            <input type="password" name="password" placeholder="请输入密码" required>
        </div>

        <!-- 角色选择 -->
        <div class="role-box">
            <label><input type="radio" name="role" value="user" checked> 个人用户</label>
            <label><input type="radio" name="role" value="enterprise"> 企业用户</label>
            <label><input type="radio" name="role" value="admin"> 管理员</label>
        </div>

        <button type="submit">登录</button>
    </form>
</div>
</body>
</html>
