<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>我的投递</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .back {
            display: inline-block;
            margin-bottom: 20px;
            padding: 8px 16px;
            background: #1677ff;
            color: white !important;
            border-radius: 4px;
            text-decoration: none !important;
            transition: background 0.3s;
        }
        .back:hover {
            background: #4096ff;
        }
        .card { border-radius: 10px; box-shadow: 0 1px 5px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="bg-light">
<div class="container mt-4">
    <a href="/user/page/index" class="back">← 返回首页</a>
    <h3 class="mb-3">我投递的岗位</h3>
    <div id="list"></div>
</div>

<script>
    // 写死用户ID
    const userId = 1;

    window.onload = function() {
        fetch("/delivery/getByUserId?id="+userId)
            .then(res=>res.json())
            .then(r=>{
                if(r.code === 200 && r.data.length > 0){
                    let statusMap = ["待查看","已查看","已录用","已拒绝"];
                    let listDiv = document.getElementById("list");
                    listDiv.innerHTML = "";
                    r.data.forEach(item=>{
                        listDiv.innerHTML += `
                        <div class="card p-3 mb-3">
                            <h5>${item.jobName}</h5>
                            <p class="mb-1">状态：<span class="badge bg-info">${statusMap[Number(item.deliveryStatus)]}</span></p>
                            <p class="text-success fw-bold">薪资：${item.salary}</p>
                        </div>`;
                    });
                }else{
                    document.getElementById("list").innerHTML = `<p class="text-muted">暂无投递记录</p>`;
                }
            })
            .catch(err=>{
                console.error(err);
                document.getElementById("list").innerHTML = `<p class="text-danger">加载投递记录失败</p>`;
            });
    }
</script>
</body>
</html>
