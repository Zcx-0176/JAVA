<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>修改个人信息</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .back {
            display: inline-block;
            margin-bottom: 20px;
            padding: 8px 16px;
            background: #1677ff;
            color: white !important;
            border-radius: 4px;
            text-decoration: none !important;
            transition: background 0.3s;
        }
        .back:hover {
            background: #4096ff;
        }
        .card { border-radius: 10px; box-shadow: 0 1px 5px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="bg-light">
<div class="container mt-4">
    <a href="/user/page/index" class="back">← 返回首页</a>
    <h3 class="mb-3">修改个人信息</h3>

    <div class="card shadow p-4" style="max-width: 500px;">
        <div class="mb-3">
            <label class="form-label">账号</label>
            <input type="text" id="account" class="form-control" disabled>
        </div>
        <div class="mb-3">
            <label class="form-label">姓名</label>
            <input type="text" id="username" class="form-control">
        </div>
        <div class="mb-3">
            <label class="form-label">邮箱</label>
            <input type="text" id="email" class="form-control">
        </div>
        <div class="mb-3">
            <label class="form-label">密码</label>
            <input type="text" id="password" class="form-control">
        </div>
        <button class="btn btn-primary" onclick="update()">保存修改</button>
    </div>
</div>

<script>
    const userId = 1;

    window.onload = function() {
        fetch(`/user/getById?id=${userId}`)
            .then(res=>res.json())
            .then(r=>{
                if(r.code === 200){
                    let data = r.data;
                    document.getElementById("account").value = data.account;
                    document.getElementById("username").value = data.username;
                    document.getElementById("email").value = data.email;
                    document.getElementById("password").value = data.password;
                }
            });
    }

    function update() {
        let data = {
            id: userId,
            account: document.getElementById("account").value,
            username: document.getElementById("username").value,
            email: document.getElementById("email").value,
            password: document.getElementById("password").value
        };

        fetch("/user/update", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(data)
        }).then(res=>res.json()).then(r=>{
            alert(r.msg || "修改成功！");
            if(r.code === 200){
                location.href="/user/page/index";
            }
        }).catch(err=>{
            alert("修改失败：" + err.message);
        });
    }
</script>
</body>
</html>
