<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>岗位列表</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .back {
            display: inline-block;
            margin-bottom: 20px;
            padding: 8px 16px;
            background: #1677ff;
            color: white !important;
            border-radius: 4px;
            text-decoration: none !important;
            transition: background 0.3s;
        }
        .back:hover {
            background: #4096ff;
        }
        .card { border-radius: 10px; box-shadow: 0 1px 5px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="bg-light">
<div class="container mt-4">
    <a href="/user/page/index" class="back">← 返回首页</a>
    <h3 class="mb-3">岗位列表</h3>
    <div id="list" class="row g-3"></div>
</div>

<script>
    load();

    async function load() {
        try {
            let res = await fetch("/job/list");
            let r = await res.json();
            console.log("接口返回数据：", r);

            let list = document.getElementById("list");
            let dataList = Array.isArray(r) ? r : (r.data || []);

            if (dataList.length === 0) {
                list.innerHTML = `<div class="alert alert-info">暂无岗位数据</div>`;
                return;
            }

            dataList.forEach(item => {
                list.innerHTML += `
                <div class="col-md-6">
                    <div class="card p-3">
                        <h5 class="mb-2">${item.jobName || '无名称'}</h5>
                        <p class="text-success fw-bold mb-1">薪资：${item.salary || '面议'}</p>
                        <p class="mb-1">技能：${item.skills || '无'}</p>
                        <p class="mb-3">地点：${item.workLocation || '无'}</p>
                        <button class="btn btn-sm btn-primary w-100" onclick="delivery(${item.id})">投递该岗位</button>
                    </div>
                </div>`;
            });

        } catch (err) {
            console.error("错误：", err);
            document.getElementById("list").innerHTML = `<div class="alert alert-danger">加载失败：${err.message}</div>`;
        }
    }

    let userId = 1;
    function delivery(jobId) {
        fetch("/delivery/add?userId="+userId+"&jobId="+jobId, {method:"POST"})
            .then(res=>res.json()).then(r=>{
                alert(r.msg || "投递成功！");
            }).catch(err=>{
                alert("投递失败！");
            });
    }
</script>
</body>
</html>
