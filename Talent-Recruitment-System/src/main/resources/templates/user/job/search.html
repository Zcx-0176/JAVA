<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>技能匹配岗位</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .back {
            display: inline-block;
            margin-bottom: 20px;
            padding: 8px 16px;
            background: #1677ff;
            color: white !important;
            border-radius: 4px;
            text-decoration: none !important;
            transition: background 0.3s;
        }
        .back:hover {
            background: #4096ff;
        }
        .card { border-radius: 10px; box-shadow: 0 1px 5px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="bg-light">
<div class="container mt-4">
    <a href="/user/page/index" class="back">← 返回首页</a>
    <h3 class="mb-3">技能匹配岗位</h3>

    <div class="input-group mb-3">
        <input id="skills" class="form-control" placeholder="输入技能关键词">
        <button class="btn btn-primary" onclick="search()">搜索匹配</button>
    </div>

    <div id="list" class="row g-3"></div>
</div>

<script>
    function search() {
        let skills = document.getElementById("skills").value;
        fetch("/job/searchBySkills?skills="+skills).then(res=>res.json()).then(r=>{
            document.getElementById("list").innerHTML = "";
            let dataList = Array.isArray(r) ? r : (r.data || []);
            dataList.forEach(item=>{
                document.getElementById("list").innerHTML += `
                <div class="col-md-6">
                    <div class="card p-3">
                        <h5 class="mb-2">${item.jobName || '无名称'}</h5>
                        <p class="text-success fw-bold mb-1">薪资：${item.salary || '面议'}</p>
                        <p class="mb-3">技能：${item.skills || '无'}</p>
                        <button class="btn btn-sm btn-primary w-100" onclick="delivery(${item.id})">投递</button>
                    </div>
                </div>`;
            })
        })
    }

    const userId = 1;
    function delivery(jobId) {
        fetch("/delivery/add?userId="+userId+"&jobId="+jobId, {method:"POST"})
            .then(res=>res.json()).then(r=>{
                if(r && r.msg){
                    alert(r.msg);
                }else{
                    alert("投递成功！");
                }
            }).catch(err=>{
                alert("投递失败！");
            });
    }
</script>
</body>
</html>
